<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Results</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <nav>
    <h2>Results</h2>
    <div>
      <a href="dashboard.html">Dashboard</a>
      <a href="create-poll.html">Create Poll</a>
      <a href="vote.html">Vote</a>
      <a href="results.html">Results</a>
      <a href="#" onclick="logout()">Logout</a>
    </div>
  </nav>

  <div class="container">
    <h2>View Poll Results</h2>

    <input type="text" id="pollId" placeholder="Enter Poll ID" />
    <button onclick="getResults()">Get Results</button>

    <div id="resultsBox"></div>
  </div>

  <script src="app.js"></script>
  <script>
    async function getResults() {
      const pollId = document.getElementById("pollId").value.trim();

      if (!pollId) {
        alert("Enter poll ID");
        return;
      }

      try {
        const data = await apiRequest(`/votes/results/${pollId}`);

        let html = `<h3>${data.pollTitle}</h3><ul>`;

        data.results.forEach((r) => {
          html += `<li>${r.optionText}: ${r.votes} votes</li>`;
        });

        html += "</ul>";

        document.getElementById("resultsBox").innerHTML = html;
      } catch (error) {
        document.getElementById("resultsBox").innerHTML =
          `<p class="error">${error.message}</p>`;
      }
    }
  </script>
</body>
</html>
