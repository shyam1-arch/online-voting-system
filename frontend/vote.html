<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vote</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <nav>
    <h2>VoteGuard</h2>
    <div class="nav-links" id="navLinks"></div>
  </nav>

  <div class="container" style="max-width: 820px;">
    <div class="section-header" style="text-align:left;">
      <div class="hero-badge">Secure Ballot Access</div>
      <h2>Cast your vote securely</h2>
      <p>Use your one-time voting link or token to access the ballot.</p>
    </div>

    <div id="statusBox"></div>

    <div class="card" id="tokenCard" style="display:block;">
      <h3>Step 1: Validate Voting Token</h3>
      <input type="text" id="token" placeholder="Enter your secure voting token" />
      <button onclick="validateToken()">Validate Token</button>
      <div id="tokenMessage"></div>
    </div>

    <div class="card" id="voteSection" style="display:none; margin-top: 20px;">
      <div class="hero-badge">Ballot Ready</div>
      <h2 id="pollTitle"></h2>
      <p id="pollDescription"></p>

      <h3 style="margin-top: 20px; margin-bottom: 12px;">Step 2: Select one option</h3>
      <div id="optionsContainer"></div>

      <button style="margin-top: 14px;" onclick="submitVote()">Submit Vote</button>
      <div id="voteMessage"></div>
    </div>
  </div>

  <script src="app.js"></script>
  <script>
    const user = getUser();

    if (user && user.role === "admin") {
      document.getElementById("navLinks").innerHTML = `
        <a href="dashboard.html">Dashboard</a>
        <a href="create-poll.html">Create Poll</a>
        <a href="results.html">Results</a>
        <a href="#" onclick="logout()">Logout</a>
      `;
    } else if (user) {
      document.getElementById("navLinks").innerHTML = `
        <a href="dashboard.html">Dashboard</a>
        <a href="upload-document.html">Upload Document</a>
        <a href="vote.html">Vote</a>
        <a href="results.html">Results</a>
        <a href="#" onclick="logout()">Logout</a>
      `;
    } else {
      document.getElementById("navLinks").innerHTML = `
        <a href="index.html">Home</a>
        <a href="login.html">Login</a>
        <a href="register.html">Register</a>
      `;
    }

    let currentToken = "";
    let currentPollId = "";
    let selectedOptionId = "";

    function autoLoadTokenFromURL() {
      const params = new URLSearchParams(window.location.search);
      const token = params.get("token");
      console.log("Token from URL:", token);

      if (token) {
        document.getElementById("token").value = token;
        validateToken();
      }
    }

    async function validateToken() {
      const token = document.getElementById("token").value.trim();

      if (!token) {
        showMessage("tokenMessage", "Please enter a token", "error");
        return;
      }

      try {
        const data = await apiRequest(`/tokens/validate/${token}`);
        currentToken = token;
        currentPollId = data.votingToken.pollId._id;

        const pollData = await apiRequest(`/polls/${currentPollId}`);

        document.getElementById("pollTitle").textContent = pollData.poll.title;
        document.getElementById("pollDescription").textContent = pollData.poll.description;

        const optionsContainer = document.getElementById("optionsContainer");
        optionsContainer.innerHTML = "";

        pollData.options.forEach((option) => {
          const div = document.createElement("label");
          div.className = "option-card";
          div.innerHTML = `
            <input type="radio" name="voteOption" value="${option._id}" />
            <span>${option.optionText}</span>
          `;
          optionsContainer.appendChild(div);
        });

        document.getElementById("voteSection").style.display = "block";
        showMessage("tokenMessage", "Token is valid. Ballot loaded successfully.", "success");
      } catch (error) {
        document.getElementById("voteSection").style.display = "none";
        showMessage("tokenMessage", error.message, "error");
      }
    }

    async function submitVote() {
      const selected = document.querySelector('input[name="voteOption"]:checked');

      if (!selected) {
        showMessage("voteMessage", "Please select an option", "error");
        return;
      }

      selectedOptionId = selected.value;

      try {
        const data = await apiRequest("/votes", "POST", {
          token: currentToken,
          optionId: selectedOptionId
        });

        showMessage("voteMessage", data.message, "success");
      } catch (error) {
        showMessage("voteMessage", error.message, "error");
      }
    }

    autoLoadTokenFromURL();
  </script>
</body>
</html>
