<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <nav>
    <h2>VoteGuard</h2>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="login.html">Login</a>
      <a href="vote.html">Vote</a>
    </div>
  </nav>

  <div class="container">
    <div class="form-card">
      <div class="section-header">
        <div class="hero-badge">Create Account</div>
        <h2>Register to access the platform</h2>
        <p>Create your account to upload verification documents and participate securely.</p>
      </div>

      <form id="registerForm">
        <input type="text" id="fullName" placeholder="Full Name" required />
        <input type="email" id="email" placeholder="Email Address" required />
        <input type="password" id="password" placeholder="Password" required />
        <select id="role">
          <option value="voter">Voter</option>
          <option value="admin">Admin</option>
        </select>
        <button type="submit">Create Account</button>
        <div id="registerMessage"></div>
      </form>
    </div>
  </div>

  <script src="app.js"></script>
  <script>
    document.getElementById("registerForm").addEventListener("submit", async (e) => {
      e.preventDefault();

      const fullName = document.getElementById("fullName").value.trim();
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value.trim();
      const role = document.getElementById("role").value;

      try {
        const data = await apiRequest("/auth/register", "POST", {
          fullName,
          email,
          password,
          role
        });

        saveToken(data.token);
        saveUser(data.user);

        showMessage("registerMessage", "Registration successful", "success");

        setTimeout(() => {
          window.location.href = "login.html";
        }, 1000);
      } catch (error) {
        showMessage("registerMessage", error.message, "error");
      }
    });
  </script>
</body>
</html>
